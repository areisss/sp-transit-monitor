name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - "lambda/**"

permissions:
  contents: read

env:
  AWS_REGION: "us-east-1"
  LAMBDA_FUNCTION_NAME: "transit-monitor-sptrans-producer"
  S3_BUCKET: "transit-monitor-lambda-code"

jobs:
  deploy:
    name: Package & Deploy Lambda
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies into package dir
        run: |
          pip install -r lambda/requirements.txt -t lambda/package/

      - name: Create deployment package
        run: |
          cd lambda/package && zip -r9 ../../sptrans-producer.zip .
          cd ../.. && cd lambda && zip -g ../sptrans-producer.zip -r sptrans_producer/

      - name: Upload to S3
        run: |
          aws s3 cp sptrans-producer.zip s3://${{ env.S3_BUCKET }}/lambda/sptrans-producer.zip

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket ${{ env.S3_BUCKET }} \
            --s3-key lambda/sptrans-producer.zip

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query 'Configuration.{State:State,LastModified:LastModified}'
