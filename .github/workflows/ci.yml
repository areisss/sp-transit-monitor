name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check lambda/ tests/

      - name: Ruff format check
        run: ruff format --check lambda/ tests/

  test-lambda:
    name: Lambda Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[lambda,dev]"

      - name: Run Lambda tests
        run: pytest lambda/tests/ -v --tb=short

  test-spark:
    name: Spark Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install -e ".[databricks,dev]"

      - name: Run Spark tests
        run: pytest tests/unit/databricks/ -v --tb=short -m "not integration"
        env:
          PYTHONPATH: ${{ github.workspace }}
